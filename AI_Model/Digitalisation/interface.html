<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECG Digitization</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #0f172a;
    }

    p.subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .upload-box {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }

    input[type="file"],
    input[type="number"] {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status {
      margin: 16px 0;
      text-align: center;
      font-weight: bold;
    }

    .result-section {
      margin-top: 24px;
    }

    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h3 {
      margin-top: 0;
      color: #111827;
    }

    .links a {
      display: inline-block;
      margin: 6px 10px 6px 0;
      text-decoration: none;
      color: #2563eb;
      font-weight: 600;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .images-grid img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: white;
    }

    pre {
      background: #111827;
      color: #f9fafb;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
    }

    .small-text {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ECG Digitization Interface</h1>
    <p class="subtitle">
      Charger une image ECG pour obtenir le signal digitalisé, l'image normalisée, l'image rectifiée et les visualisations.
    </p>

    <div class="upload-box">
      <input type="file" id="ecgFile" accept="image/*" />
      <input type="number" id="sampleLength" value="5000" min="1000" step="100" />
      <button type="button" onclick="processECG()">Traiter ECG</button>
    </div>

    <div class="status" id="status"></div>

    <div class="result-section" id="resultSection" style="display:none;">
      <div class="card">
        <h3>Informations générales</h3>
        <div id="generalInfo"></div>
      </div>

      <div class="card">
        <h3>Fichiers générés</h3>
        <div class="links" id="fileLinks"></div>
      </div>

      <div class="card">
        <h3>Visualisations</h3>
        <div class="images-grid" id="imagesGrid"></div>
      </div>

      <div class="card">
        <h3>Aperçu JSON</h3>
        <pre id="jsonOutput"></pre>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    function setStatus(message, color = "#111827") {
      const status = document.getElementById("status");
      status.textContent = message;
      status.style.color = color;
    }

    function createImageCard(title, src) {
      return `
        <div>
          <p class="small-text"><strong>${title}</strong></p>
          <img src="${API_BASE}${src}" alt="${title}" />
        </div>
      `;
    }

    async function processECG() {
      const fileInput = document.getElementById("ecgFile");
      const sampleLength = document.getElementById("sampleLength").value;
      const resultSection = document.getElementById("resultSection");
      const generalInfo = document.getElementById("generalInfo");
      const fileLinks = document.getElementById("fileLinks");
      const imagesGrid = document.getElementById("imagesGrid");
      const jsonOutput = document.getElementById("jsonOutput");

      if (!fileInput.files.length) {
        setStatus("Veuillez sélectionner une image ECG.", "red");
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("sample_length", sampleLength);
      formData.append("save_result", "true");

      setStatus("Traitement en cours...", "#2563eb");
      resultSection.style.display = "none";

      try {
        const response = await fetch(`${API_BASE}/process_ecg`, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Erreur inconnue");
        }

        setStatus("Traitement terminé avec succès.", "green");
        resultSection.style.display = "block";

        generalInfo.innerHTML = `
          <p><strong>Message :</strong> ${data.message}</p>
          <p><strong>Shape :</strong> ${JSON.stringify(data.series_shape)}</p>
        `;

        let linksHtml = "";
        if (data.output_file) {
          linksHtml += `<a href="${API_BASE}${data.output_file}" target="_blank">Télécharger le fichier .npy</a>`;
        }
        if (data.normalised_image) {
          linksHtml += `<a href="${API_BASE}${data.normalised_image}" target="_blank">Voir image normalisée</a>`;
        }
        if (data.rectified_image) {
          linksHtml += `<a href="${API_BASE}${data.rectified_image}" target="_blank">Voir image rectifiée</a>`;
        }
        if (data.plot_4leads) {
          linksHtml += `<a href="${API_BASE}${data.plot_4leads}" target="_blank">Voir plot 4 leads</a>`;
        }
        if (data.plot_12leads) {
          linksHtml += `<a href="${API_BASE}${data.plot_12leads}" target="_blank">Voir plot 12 leads</a>`;
        }
        if (data.plot_full_lead_ii) {
          linksHtml += `<a href="${API_BASE}${data.plot_full_lead_ii}" target="_blank">Voir Full Lead II</a>`;
        }
        fileLinks.innerHTML = linksHtml || "<p>Aucun fichier généré.</p>";

        let imagesHtml = "";
        if (data.normalised_image) {
          imagesHtml += createImageCard("Image normalisée", data.normalised_image);
        }
        if (data.rectified_image) {
          imagesHtml += createImageCard("Image rectifiée", data.rectified_image);
        }
        if (data.plot_4leads) {
          imagesHtml += createImageCard("Plot 4 leads", data.plot_4leads);
        }
        if (data.plot_12leads) {
          imagesHtml += createImageCard("Plot 12 leads", data.plot_12leads);
        }
        if (data.plot_full_lead_ii) {
          imagesHtml += createImageCard("Full Lead II", data.plot_full_lead_ii);
        }
        imagesGrid.innerHTML = imagesHtml || "<p>Aucune image disponible.</p>";

        jsonOutput.textContent = JSON.stringify(data, null, 2);

      } catch (error) {
        setStatus(`Erreur : ${error.message}`, "red");
        resultSection.style.display = "none";
      }
    }
  </script>
</body>
</html>
